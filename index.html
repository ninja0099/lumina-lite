<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="data:," />
    <title>Lumina — Generate covers images</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" />
    <link rel="stylesheet" href="/src/styles.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="topbar-left">
        <h1>Lumina<span>.</span></h1>
        <span class="tagline">COVER IMAGE STUDIO</span>
      </div>
      <div class="topbar-center">
        <div class="aspect-btns" role="group" aria-label="Aspect ratio">
          <button class="aspect-btn active" data-ratio="16:9">16:9</button>
          <button class="aspect-btn" data-ratio="1:1">1:1</button>
          <button class="aspect-btn" data-ratio="9:16">9:16</button>
          <button class="aspect-btn" data-ratio="2:3">2:3</button>
        </div>
      </div>
      <div class="topbar-right">
        <button id="undo" class="btn icon" aria-label="Undo" title="Undo (Ctrl+Z)">
          <svg viewBox="0 0 24 24" aria-hidden="true"><polyline points="9 14 4 9 9 4"/><path d="M20 20v-7a4 4 0 0 0-4-4H4"/></svg>
        </button>
        <button id="redo" class="btn icon" aria-label="Redo" title="Redo (Ctrl+Shift+Z)">
          <svg viewBox="0 0 24 24" aria-hidden="true"><polyline points="15 14 20 9 15 4"/><path d="M4 20v-7a4 4 0 0 1 4-4h12"/></svg>
        </button>
        <button id="reset" class="btn ghost">Reset</button>
        <button id="exportTop" class="btn primary">Export</button>
      </div>
    </header>

    <main class="layout">
      <section class="stage">
        <div class="canvas-info">
          <span id="exportW">1920</span> × <span id="exportH">1080</span> · <span id="aspectLabel">16:9</span>
          <span class="muted">LIVE</span>
        </div>
        <div class="canvas-wrap" id="canvasWrap">
          <canvas id="preview" width="960" height="540"></canvas>
        </div>
        <div class="zoom-bar">
          <span class="muted">ZOOM</span>
          <button id="zoomOut" class="btn icon" aria-label="Zoom out">−</button>
          <span id="zoomLabel">100%</span>
          <button id="zoomIn" class="btn icon" aria-label="Zoom in">+</button>
          <div class="zoom-presets">
            <button class="zoom-preset" data-z="50">50%</button>
            <button class="zoom-preset active" data-z="100">100%</button>
            <button class="zoom-preset" data-z="150">150%</button>
            <button class="zoom-preset" data-z="200">200%</button>
          </div>
        </div>
      </section>

      <aside class="panel" id="panel">
        <div class="sheet-handle" id="sheetHandle">
          <div class="grip"></div>
          <button class="sheet-tab">Customize ▾</button>
        </div>
        <nav class="group-tabs" id="groupTabs" aria-label="Settings groups"></nav>

        <div class="groups" id="groups">
          <!-- Presets -->
          <section class="group" id="group-presets">
            <h2 class="group-head"><span class="group-title">Presets <span id="presetCount" class="count">20</span></span> <span class="chev">▾</span></h2>
            <div class="group-body">
              <div id="presets" class="preset-grid"></div>
            </div>
          </section>

          <!-- Layers -->
          <section class="group" id="group-layers">
            <h2 class="group-head"><span class="group-title">Layers</span> <span class="chev">▾</span></h2>
            <div class="group-body">
              <label class="inline"><input id="layerBackground" type="checkbox" checked /> Background</label>
              <label class="inline"><input id="layerPattern" type="checkbox" checked /> Pattern</label>
              <label class="inline"><input id="layerText" type="checkbox" checked /> Text</label>
            </div>
          </section>

          <!-- Typography -->
          <section class="group" id="group-typography">
            <h2 class="group-head"><span class="group-title">Typography</span> <span class="chev">▾</span></h2>
            <div class="group-body">
              <label class="stack">Text
                <textarea id="text" rows="2" placeholder="Your title (use Enter for line breaks)"></textarea>
              </label>
              <label class="row">
                <span class="chk"><input id="uppercase" type="checkbox" /> Uppercase</span>
                <span class="chk"><input id="italic" type="checkbox" /> Italic</span>
              </label>
              <label class="stack">Font family
                <select id="font"></select>
              </label>
              <label class="stack inline">Import font from device
                <input id="fontFile" type="file" accept=".ttf,.otf,.woff,.woff2" />
              </label>
              <label class="stack">Font size <span class="val" id="fontSizeVal">220px</span>
                <span class="control"><input id="fontSize" type="range" min="40" max="500" step="1" value="220" />
                  <select id="fontSizeUnit"><option value="px">px</option><option value="pct">% h</option></select></span>
              </label>
              <label class="stack">Weight <span class="val" id="weightVal">700</span>
                <span class="control"><input id="weight" type="range" min="400" max="900" step="100" value="700" />
                  <select id="weightUnit"><option value="weight">wght</option><option value="px">px</option></select></span>
              </label>
              <label class="stack">Letter spacing <span class="val" id="spacingVal">4px</span>
                <span class="control"><input id="spacing" type="range" min="-10" max="40" step="1" value="4" />
                  <select id="letterSpacingUnit"><option value="px">px</option><option value="pct">% h</option></select></span>
              </label>
              <label class="stack">Line height <span class="val" id="lineHeightVal">1.2</span>
                <span class="control"><input id="lineHeight" type="range" min="0.6" max="3" step="0.1" value="1.2" />
                  <select id="lineHeightUnit"><option value="ratio">ratio</option><option value="px">px</option></select></span>
              </label>
              <label class="stack">Position X <span class="val" id="posXVal">50%</span>
                <span class="control"><input id="posX" type="range" min="0" max="100" step="1" value="50" />
                  <select id="posXUnit"><option value="pct">% w</option><option value="px">px</option></select></span>
              </label>
              <label class="stack">Position Y <span class="val" id="posYVal">50%</span>
                <span class="control"><input id="posY" type="range" min="0" max="100" step="1" value="50" />
                  <select id="posYUnit"><option value="pct">% h</option><option value="px">px</option></select></span>
              </label>
              <label class="stack">Text rotation <span class="val" id="textRotationVal">0°</span>
                <input id="textRotation" type="range" min="-90" max="90" step="1" value="0" />
              </label>
              <label class="stack">Align
                <div class="btn-group" id="alignGroup">
                  <button class="btn toggle" data-val="left">Left</button>
                  <button class="btn toggle active" data-val="center">Center</button>
                  <button class="btn toggle" data-val="right">Right</button>
                </div>
              </label>
            </div>
          </section>

          <!-- Text Style & Effects -->
          <section class="group" id="group-textfx">
            <h2 class="group-head"><span class="group-title">Text style &amp; effects</span> <span class="chev">▾</span></h2>
            <div class="group-body">
              <h3>Color</h3>
              <label class="inline"><span>Use gradient</span><input id="textGradient" type="checkbox" /></label>
              <label class="inline">Color A<input id="textColor" type="color" value="#ffffff" /></label>
              <label class="inline">Color B<input id="textColor2" type="color" value="#9aa0ff" /></label>
              <label class="stack">Angle <span class="val" id="textGradientAngleVal">135°</span>
                <input id="textGradientAngle" type="range" min="0" max="360" step="1" value="135" />
              </label>
              <label class="stack">Opacity <span class="val" id="textOpacityVal">1.00</span>
                <input id="textOpacity" type="range" min="0" max="1" step="0.01" value="1" />
              </label>
              <label class="inline"><span>Transparent text (cutout)</span><input id="transparentText" type="checkbox" /></label>
              <h3>Outline</h3>
              <label class="inline"><span>Enable outline</span><input id="textOutline" type="checkbox" /></label>
              <label class="stack">Outline width <span class="val" id="textOutlineWidthVal">4px</span>
                <input id="textOutlineWidth" type="range" min="1" max="40" step="1" value="4" />
              </label>
              <label class="inline">Outline color<input id="textOutlineColor" type="color" value="#000000" /></label>
              <h3>Shadow</h3>
              <label class="inline"><span>Enable shadow</span><input id="textShadow" type="checkbox" /></label>
              <label class="inline">Shadow color<input id="shadowColor" type="color" value="#000000" /></label>
              <label class="stack">Shadow blur <span class="val" id="shadowBlurVal">40px</span>
                <input id="shadowBlur" type="range" min="0" max="120" step="1" value="40" />
              </label>
              <label class="stack">Shadow opacity <span class="val" id="shadowOpacityVal">0.60</span>
                <input id="shadowOpacity" type="range" min="0" max="1" step="0.05" value="0.6" />
              </label>
              <h3>Glow</h3>
              <label class="inline"><span>Enable glow</span><input id="textGlow" type="checkbox" /></label>
            </div>
          </section>

          <!-- Background -->
          <section class="group" id="group-background">
            <h2 class="group-head"><span class="group-title">Background</span> <span class="chev">▾</span></h2>
            <div class="group-body">
              <label class="inline"><span>Transparent (PNG alpha)</span><input id="transparent" type="checkbox" /></label>
              <label class="stack">Mode
                <span class="seg">
                  <button id="bgModeLinear" class="seg-btn active" data-mode="linear">Linear</button>
                  <button id="bgModeMesh" class="seg-btn" data-mode="mesh">Mesh</button>
                </span>
              </label>
              <div id="linearBg">
                <label class="inline"><span>Use gradient</span><input id="bgGradient" type="checkbox" checked /></label>
                <label class="inline">Color A<input id="bgColor" type="color" value="#0b0b12" /></label>
                <label class="inline">Color B<input id="bgColor2" type="color" value="#1b1b3a" /></label>
                <label class="stack">Angle <span class="val" id="bgGradientAngleVal">135°</span>
                  <input id="bgGradientAngle" type="range" min="0" max="360" step="1" value="135" />
                </label>
                <label class="stack">Gradient opacity <span class="val" id="bgGradientOpacityVal">0.45</span>
                  <input id="bgGradientOpacity" type="range" min="0" max="1" step="0.01" value="0.45" />
                </label>
              </div>
              <div id="meshBg" class="hidden">
                <label class="inline">Base color<input id="bgMeshColor" type="color" value="#0b0b12" /></label>
                <label class="inline wrap">Nodes <span class="val" id="meshCountVal">3</span>
                  <button id="meshAdd" class="mini-btn">+ Add</button>
                  <button id="meshDel" class="mini-btn">− Remove</button>
                </label>
                <label class="inline">Selected node<input id="meshNodeColor" type="color" value="#7a0d0d" /></label>
                <label class="stack">Node radius <span class="val" id="meshNodeRadiusVal">60%</span>
                  <input id="meshNodeRadius" type="range" min="10" max="150" step="1" value="60" />
                </label>
                <label class="inline"><span>Spread (blob size)</span><input id="meshSpread" type="range" min="1" max="6" step="1" value="5" /></label>
                <label class="stack">Blur <span class="val" id="meshBlurVal">30px</span>
                  <input id="meshBlur" type="range" min="0" max="60" step="1" value="30" />
                </label>
                <label class="inline"><span>Animate</span><input id="meshAnim" type="checkbox" /></label>
                <div id="meshAnimControls" class="hidden">
                  <label class="stack">Style
                    <select id="meshAnimStyle"><option value="float">Float</option><option value="orbit">Orbit</option><option value="breathe">Breathe</option><option value="wave">Wave</option></select>
                  </label>
                  <label class="stack">Speed <span class="val" id="meshAnimSpeedVal">1</span>
                    <input id="meshAnimSpeed" type="range" min="0.1" max="3" step="0.1" value="1" />
                  </label>
                  <label class="stack">Amplitude <span class="val" id="meshAnimAmplitudeVal">15%</span>
                    <input id="meshAnimAmplitude" type="range" min="0" max="40" step="1" value="15" />
                  </label>
                  <label class="stack">Duration (s) <span class="val" id="meshAnimDurationVal">6</span>
                    <input id="meshAnimDuration" type="range" min="2" max="20" step="1" value="6" />
                  </label>
                </div>
                <p class="hint">Drag nodes directly on the canvas.</p>
              </div>
              <h3>Background image</h3>
              <label class="stack">Image
                <input id="bgImageFile" type="file" accept="image/*" />
              </label>
              <label class="stack">Fit
                <select id="bgImageFit"><option value="cover">Cover</option><option value="contain">Contain</option><option value="stretch">Stretch</option><option value="tile">Tile</option></select>
              </label>
              <label class="stack">Image opacity <span class="val" id="bgImageOpacityVal">0.60</span>
                <input id="bgImageOpacity" type="range" min="0" max="1" step="0.05" value="0.6" />
              </label>
              <label class="stack">Image X <span class="val" id="bgImageXVal">50%</span>
                <input id="bgImageX" type="range" min="0" max="100" step="1" value="50" />
              </label>
              <label class="stack">Image Y <span class="val" id="bgImageYVal">50%</span>
                <input id="bgImageY" type="range" min="0" max="100" step="1" value="50" />
              </label>
              <label class="stack">Image rotation <span class="val" id="bgImageRotationVal">0°</span>
                <input id="bgImageRotation" type="range" min="-90" max="90" step="1" value="0" />
              </label>
            </div>
          </section>

          <!-- Background Effects -->
          <section class="group" id="group-bgeffects">
            <h2 class="group-head"><span class="group-title">Background effects</span> <span class="chev">▾</span></h2>
            <div class="group-body">
              <label class="stack">Gaussian blur <span class="val" id="bgBlurVal">0px</span>
                <input id="bgBlur" type="range" min="0" max="50" step="1" value="0" />
              </label>
              <label class="stack">Chromatic aberration <span class="val" id="bgChromaticVal">0px</span>
                <input id="bgChromatic" type="range" min="0" max="30" step="1" value="0" />
              </label>
              <label class="stack">Wave amount <span class="val" id="bgWaveAmountVal">0px</span>
                <input id="bgWaveAmount" type="range" min="0" max="30" step="1" value="0" />
              </label>
              <label class="stack">Wave frequency <span class="val" id="bgWaveFrequencyVal">4</span>
                <input id="bgWaveFrequency" type="range" min="1" max="12" step="1" value="4" />
              </label>
              <label class="stack">Glitch / datamosh <span class="val" id="bgGlitchVal">0%</span>
                <input id="bgGlitch" type="range" min="0" max="100" step="1" value="0" />
              </label>
              <label class="stack">Film noise / grain <span class="val" id="bgFilmGrainVal">0%</span>
                <input id="bgFilmGrain" type="range" min="0" max="100" step="1" value="0" />
              </label>
              <label class="inline"><span>Halftone dots</span><input id="bgHalftone" type="checkbox" /></label>
              <label class="stack">Vignette <span class="val" id="bgVignetteVal">0%</span>
                <input id="bgVignette" type="range" min="0" max="100" step="1" value="0" />
              </label>
              <label class="inline"><span>Pixelate / mosaic</span><input id="bgPixelate" type="checkbox" /></label>
              <label class="stack">Duotone / gradient map <span class="val" id="duotoneIntensityVal">0%</span>
                <input id="duotoneIntensity" type="range" min="0" max="100" step="1" value="0" />
              </label>
              <label class="inline">Duotone shadow<input id="duotoneColorA" type="color" value="#0b0b12" /></label>
              <label class="inline">Duotone highlight<input id="duotoneColorB" type="color" value="#9aa0ff" /></label>
              <label class="inline">Duotone mode
                <select id="bgDuotone"><option value="0">Gradient map</option><option value="1">Twin</option></select>
              </label>
              <label class="stack">Bloom / glow <span class="val" id="bgBloomVal">0%</span>
                <input id="bgBloom" type="range" min="0" max="100" step="1" value="0" />
              </label>
              <label class="inline"><span>Long shadow (text echo)</span><input id="bgLongShadow" type="checkbox" /></label>
              <label class="stack">Echo copies <span class="val" id="bgEchoVal">0</span>
                <input id="bgEcho" type="range" min="0" max="8" step="1" value="0" />
              </label>
              <label class="inline"><span>Border glow</span><input id="borderGlow" type="checkbox" /></label>
            </div>
          </section>

          <!-- Overlay Pattern -->
          <section class="group" id="group-pattern">
            <h2 class="group-head"><span class="group-title">Overlay pattern</span> <span class="chev">▾</span></h2>
            <div class="group-body">
              <label class="stack">Pattern
                <select id="pattern"></select>
              </label>
              <label class="inline">Pattern color<input id="patternColor" type="color" value="#ffffff" /></label>
              <label class="inline"><span>Enable glass panel</span><input id="glassPanel" type="checkbox" /></label>
            </div>
          </section>

          <!-- Frame & Corners -->
          <section class="group" id="group-frame">
            <h2 class="group-head"><span class="group-title">Frame &amp; corners</span> <span class="chev">▾</span></h2>
            <div class="group-body">
              <label class="stack">Corner radius <span class="val" id="cornerRadiusVal">0px</span>
                <input id="cornerRadius" type="range" min="0" max="600" step="1" value="0" />
              </label>
            </div>
          </section>

          <!-- Export -->
          <section class="group" id="group-export">
            <h2 class="group-head"><span class="group-title">Export</span> <span class="chev">▾</span></h2>
            <div class="group-body">
              <label class="stack">Format
                <select id="exportFormat"><option value="png">PNG</option><option value="jpeg">JPEG</option><option value="webp">WebP</option></select>
              </label>
              <label class="stack">Resolution
                <span class="res-inputs">
                  <input id="resW" type="number" min="16" max="8000" step="1" value="1920" />
                  <span class="res-x">×</span>
                  <input id="resH" type="number" min="16" max="8000" step="1" value="1080" />
                </span>
              </label>
              <label class="inline"><input id="resLock" type="checkbox" /> Lock aspect ratio</label>
              <div class="row">
                <button id="exportPng" class="btn primary">Export</button>
                <button id="copyClip" class="btn">Copy</button>
              </div>
              <div class="row">
                <button id="exportMp4" class="btn">Export MP4</button>
              </div>
              <p class="hint" id="exportStatus"></p>
            </div>
          </section>
        </div>
      </aside>
    </main>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
